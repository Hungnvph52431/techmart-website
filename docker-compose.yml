services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: techmart-mysql
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --character-set-client-handshake=FALSE
    environment:
      MYSQL_ROOT_PASSWORD: techmart123
      MYSQL_DATABASE: mobile_shop
      MYSQL_USER: techmart_user
      MYSQL_PASSWORD: techmart123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/infrastructure/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/infrastructure/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - techmart-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techmart-backend
    restart: always
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=mobile_shop
      - DB_USER=techmart_user
      - DB_PASSWORD=techmart123
      - JWT_SECRET=techmart_jwt_secret_key_2026
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:5173,http://localhost:5174
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - techmart-network

  # Frontend App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: techmart-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5001/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - techmart-network

networks:
  techmart-network:
    driver: bridge

volumes:
  mysql_data:
