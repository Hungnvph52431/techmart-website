services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: techmart-mysql-prod
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --character-set-client-handshake=FALSE
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-techmart123}
      MYSQL_DATABASE: ${DB_NAME:-mobile_shop}
      MYSQL_USER: ${DB_USER:-techmart_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-techmart123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/infrastructure/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/infrastructure/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - techmart-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API (Production Build)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: techmart-backend-prod
    restart: always
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-mobile_shop}
      - DB_USER=${DB_USER:-techmart_user}
      - DB_PASSWORD=${DB_PASSWORD:-techmart123}
      - JWT_SECRET=${JWT_SECRET:-techmart_jwt_secret_key_2026}
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      - UPLOAD_PATH=uploads
      - MAX_FILE_SIZE=5242880
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM_NAME=TechMart
      - VNPAY_TMN_CODE=${VNPAY_TMN_CODE:-}
      - VNPAY_HASH_SECRET=${VNPAY_HASH_SECRET:-}
      - VNPAY_RETURN_URL=${VNPAY_RETURN_URL:-http://localhost:5001/api/payment/vnpay/return}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - techmart-network

  # Frontend App (Production Build with Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5001/api}
    container_name: techmart-frontend-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - techmart-network

networks:
  techmart-network:
    driver: bridge

volumes:
  mysql_data:
  backend_uploads:
